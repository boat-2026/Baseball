<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Season Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fff; color: #000; padding: 12px; }
h1 { font-size: 16px; text-align: center; margin-bottom: 4px; letter-spacing: 0.5px; }
.subtitle { text-align: center; font-size: 11px; color: #666; margin-bottom: 10px; }
.tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 12px; }
.tab { padding: 6px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid #000; background: #fff; color: #000; font-family: inherit; }
.tab:first-child { border-radius: 4px 0 0 4px; }
.tab:last-child { border-radius: 0 4px 4px 0; border-left: none; }
.tab.active { background: #000; color: #fff; }
.team-selector { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
.team-selector select { font-size: 13px; padding: 4px 8px; font-family: inherit; }
.team-logo { height: 36px; width: 36px; object-fit: contain; }
.stats-bar { display: flex; justify-content: center; gap: 24px; font-size: 12px; margin-bottom: 10px; font-weight: 600; }
.stats-bar span { color: #333; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #000; color: #fff; font-weight: 600; font-size: 11px; padding: 5px 4px; text-align: center; position: sticky; top: 0; z-index: 2; }
td { padding: 4px; text-align: center; border-bottom: 1px solid #ccc; white-space: nowrap; }
tr.completed { background: #fff; }
tr.completed:hover { background: #f5f5f5; }
tr.today { background: #f0f0f0; font-weight: 600; }
tr.upcoming td { color: #999; }
tr.win td.wl { color: #000; font-weight: 700; }
tr.loss td.wl { color: #000; font-weight: 400; }
td.opp { text-align: left; padding-left: 8px; }
td.starter { text-align: left; padding-left: 8px; }
.loading { text-align: center; padding: 40px; font-size: 14px; color: #888; }
.off-day { color: #bbb; font-style: italic; }
.month-divider td { background: #eee; font-weight: 700; font-size: 11px; text-align: left; padding: 4px 8px; border-bottom: 2px solid #999; }
.panel { display: none; }
.panel.active { display: block; }
.conf-tag { display: inline-block; font-size: 10px; color: #888; margin-left: 4px; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
@media (max-width: 600px) {
  body { padding: 6px; }
  h1 { font-size: 14px; }
  .tabs { margin-bottom: 8px; }
  .tab { padding: 6px 16px; font-size: 12px; }
  .team-selector { gap: 6px; margin-bottom: 6px; }
  .team-selector select { font-size: 14px; padding: 6px 8px; max-width: 70vw; }
  .team-logo { height: 28px; width: 28px; }
  .stats-bar { flex-wrap: wrap; gap: 8px 16px; font-size: 11px; margin-bottom: 8px; }
  table { font-size: 11px; }
  th { font-size: 10px; padding: 4px 2px; }
  td { padding: 3px 2px; }
  td.opp { padding-left: 4px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
  td.starter { padding-left: 4px; max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
  .month-divider td { font-size: 10px; padding: 3px 6px; }
}
@media print {
  body { padding: 0; }
  th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .month-divider td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

<script>
// ==================== SHARED ====================
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
}

function monthName(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return MONTHS[d.getMonth()];
}

// ==================== TAB SWITCHING ====================
let activeTab = localStorage.getItem('tracker-tab') || 'mlb';

function switchTab(tab) {
  activeTab = tab;
  localStorage.setItem('tracker-tab', tab);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'mlb') buildMLBDashboard();
  else buildCollegeDashboard();
}

// ==================== MLB ====================
const MLB_API = 'https://statsapi.mlb.com/api/v1';
const SEASON = new Date().getFullYear();

const TEAM_ABBR = {
  108:'LAA',109:'ARI',110:'BAL',111:'BOS',112:'CHC',113:'CIN',114:'CLE',115:'COL',116:'DET',117:'HOU',
  118:'KC',119:'LAD',120:'WSH',121:'NYM',133:'OAK',134:'PIT',135:'SD',136:'SEA',137:'SF',138:'STL',
  139:'TB',140:'TEX',141:'TOR',142:'MIN',143:'PHI',144:'ATL',145:'CWS',146:'MIA',147:'NYY',158:'MIL'
};

const mlbSelect = document.getElementById('mlb-team-select');
const mlbLogo = document.getElementById('mlb-logo');

const savedMlb = localStorage.getItem('mlb-tracker-team');
if (savedMlb && mlbSelect.querySelector(`option[value="${savedMlb}"]`)) mlbSelect.value = savedMlb;

function mlbId() { return parseInt(mlbSelect.value); }
function mlbAbbr() { return TEAM_ABBR[mlbId()] || 'TM'; }
function mlbName() { return mlbSelect.selectedOptions[0]?.textContent || 'MLB'; }
function updateMlbLogo() { mlbLogo.src = `https://www.mlbstatic.com/team-logos/${mlbId()}.svg`; }

updateMlbLogo();

mlbSelect.addEventListener('change', () => {
  localStorage.setItem('mlb-tracker-team', mlbSelect.value);
  updateMlbLogo();
  document.getElementById('mlb-content').innerHTML = '<div class="loading">Loading schedule...</div>';
  buildMLBDashboard();
});

async function fetchMLBSchedule() {
  const url = `${MLB_API}/schedule?teamId=${mlbId()}&season=${SEASON}&sportId=1&gameType=R&hydrate=linescore,decisions,probablePitcher`;
  const res = await fetch(url);
  const data = await res.json();
  return data.dates || [];
}

async function fetchBoxscore(gamePk) {
  try { const res = await fetch(`${MLB_API}/game/${gamePk}/boxscore`); return await res.json(); }
  catch { return null; }
}

function getStarterStats(box, isHome) {
  if (!box) return { name: '\u2014', ip: '', k: '', er: '' };
  const side = isHome ? 'home' : 'away';
  const team = box.teams?.[side];
  if (!team) return { name: '\u2014', ip: '', k: '', er: '' };
  const starterId = team.pitchers?.[0];
  if (!starterId) return { name: '\u2014', ip: '', k: '', er: '' };
  const player = team.players?.['ID' + starterId];
  if (!player) return { name: '\u2014', ip: '', k: '', er: '' };
  const stats = player.stats?.pitching || {};
  const last = player.person?.lastName || player.person?.fullName || '\u2014';
  return { name: last, ip: stats.inningsPitched || '', k: stats.strikeOuts != null ? stats.strikeOuts : '', er: stats.earnedRuns != null ? stats.earnedRuns : '' };
}

async function buildMLBDashboard() {
  const teamId = mlbId();
  const abbr = mlbAbbr();
  const teamName = mlbName();

  document.getElementById('page-title').textContent = `${teamName.toUpperCase()} \u2014 ${SEASON} SEASON TRACKER`;
  document.title = `${teamName} \u2014 ${SEASON} Season Tracker`;

  const dates = await fetchMLBSchedule();
  const today = todayStr();

  const rows = [];
  let wins = 0, losses = 0, homeW = 0, homeL = 0, awayW = 0, awayL = 0;
  let streak = '', streakCount = 0, lastResult = '';

  const allGames = [];
  for (const dateObj of dates) {
    for (const game of dateObj.games) allGames.push({ date: dateObj.date, game });
  }

  const completed = allGames.filter(g => g.game.status?.detailedState === 'Final');
  const boxscores = {};
  const batchSize = 10;
  for (let i = 0; i < completed.length; i += batchSize) {
    const batch = completed.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(g => fetchBoxscore(g.game.gamePk)));
    batch.forEach((g, idx) => { boxscores[g.game.gamePk] = results[idx]; });
  }

  let currentMonth = '';
  for (const { date, game } of allGames) {
    const gMonth = monthName(date);
    if (gMonth !== currentMonth) { currentMonth = gMonth; rows.push({ type: 'month', label: currentMonth }); }

    const isHome = game.teams.home.team.id === teamId;
    const oppTeam = isHome ? game.teams.away.team.name : game.teams.home.team.name;
    const oppLabel = isHome ? oppTeam : `@ ${oppTeam}`;
    const status = game.status?.detailedState;
    const isFinal = status === 'Final';
    const isToday = date === today;
    const isLive = status === 'In Progress' || status === 'Live';

    let wl='', record='', tmR='', oppR='', tmH='', oppH='';
    let starter = { name:'', ip:'', k:'', er:'' };
    let rowClass = 'upcoming';

    if (isFinal) {
      const ls = game.linescore;
      const teamRuns = isHome ? ls?.teams?.home?.runs : ls?.teams?.away?.runs;
      const oppRuns = isHome ? ls?.teams?.away?.runs : ls?.teams?.home?.runs;
      const teamHits = isHome ? ls?.teams?.home?.hits : ls?.teams?.away?.hits;
      const oppHits = isHome ? ls?.teams?.away?.hits : ls?.teams?.home?.hits;
      tmR = teamRuns ?? ''; oppR = oppRuns ?? ''; tmH = teamHits ?? ''; oppH = oppHits ?? '';
      const won = teamRuns > oppRuns;
      wl = won ? 'W' : 'L';
      if (won) { wins++; if (isHome) homeW++; else awayW++; } else { losses++; if (isHome) homeL++; else awayL++; }
      if (wl === lastResult) streakCount++; else { streakCount = 1; lastResult = wl; }
      streak = `${wl}${streakCount}`;
      record = `${wins}-${losses}`;
      rowClass = won ? 'completed win' : 'completed loss';
      starter = getStarterStats(boxscores[game.gamePk], isHome);
    } else if (isToday || isLive) {
      rowClass = 'today';
      const pp = isHome ? game.teams.home.probablePitcher : game.teams.away.probablePitcher;
      starter.name = pp?.lastName || pp?.fullName || 'TBD';
      if (isLive) {
        const ls = game.linescore;
        tmR = isHome ? (ls?.teams?.home?.runs ?? '\u2014') : (ls?.teams?.away?.runs ?? '\u2014');
        oppR = isHome ? (ls?.teams?.away?.runs ?? '\u2014') : (ls?.teams?.home?.runs ?? '\u2014');
        tmH = isHome ? (ls?.teams?.home?.hits ?? '') : (ls?.teams?.away?.hits ?? '');
        oppH = isHome ? (ls?.teams?.away?.hits ?? '') : (ls?.teams?.home?.hits ?? '');
        wl = 'LIVE';
      }
    } else {
      const pp = isHome ? game.teams.home.probablePitcher : game.teams.away.probablePitcher;
      if (pp) starter.name = pp.lastName || pp.fullName || '';
    }

    rows.push({ type:'game', date:fmtDate(date), rawDate:date, wl, record, opp:oppLabel, tmR, oppR, tmH, oppH, starter:starter.name, ip:starter.ip, k:starter.k, er:starter.er, rowClass, isToday });
  }

  let html = `<table><thead><tr>
    <th>Date</th><th>W/L</th><th>Record</th><th>Opponent</th>
    <th>${abbr}</th><th>OPP</th><th>${abbr} H</th><th>OPP H</th>
    <th>Starter</th><th>IP</th><th>K</th><th>ER</th>
  </tr></thead><tbody>`;
  for (const row of rows) {
    if (row.type === 'month') { html += `<tr class="month-divider"><td colspan="12">${row.label}</td></tr>`; continue; }
    const todayMark = row.isToday ? ' \u25C0' : '';
    html += `<tr class="${row.rowClass}"><td>${row.date}${todayMark}</td><td class="wl">${row.wl}</td><td>${row.record}</td><td class="opp">${row.opp}</td><td>${row.tmR}</td><td>${row.oppR}</td><td>${row.tmH}</td><td>${row.oppH}</td><td class="starter">${row.starter}</td><td>${row.ip}</td><td>${row.k}</td><td>${row.er}</td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('mlb-content').innerHTML = html;

  document.getElementById('mlb-record').textContent = `Record: ${wins}-${losses}`;
  document.getElementById('mlb-streak').textContent = streak ? `Streak: ${streak}` : '';
  document.getElementById('mlb-home').textContent = `Home: ${homeW}-${homeL}`;
  document.getElementById('mlb-away').textContent = `Away: ${awayW}-${awayL}`;
  document.getElementById('updated').textContent = `Last updated: ${new Date().toLocaleString()}`;

  const todayRow = document.querySelector('#mlb-content tr.today');
  if (todayRow) todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ==================== COLLEGE ====================
const ESPN_API = 'https://site.api.espn.com/apis/site/v2/sports/baseball/college-baseball';

const collegeSelect = document.getElementById('college-team-select');
const collegeLogo = document.getElementById('college-logo');

const savedCollege = localStorage.getItem('college-tracker-team');
if (savedCollege && collegeSelect.querySelector(`option[value="${savedCollege}"]`)) collegeSelect.value = savedCollege;

function collegeId() { return parseInt(collegeSelect.value); }
function collegeName() { return collegeSelect.selectedOptions[0]?.textContent || 'Team'; }

function updateCollegeLogo() {
  collegeLogo.src = `https://a.espncdn.com/i/teamlogos/ncaa/500/${collegeId()}.png`;
}
updateCollegeLogo();

collegeSelect.addEventListener('change', () => {
  localStorage.setItem('college-tracker-team', collegeSelect.value);
  updateCollegeLogo();
  document.getElementById('college-content').innerHTML = '<div class="loading">Loading schedule...</div>';
  buildCollegeDashboard();
});

async function fetchCollegeSchedule(teamId) {
  const url = `${ESPN_API}/teams/${teamId}/schedule`;
  const res = await fetch(url);
  const data = await res.json();
  return data;
}

async function buildCollegeDashboard() {
  const teamId = collegeId();
  const teamName = collegeName();

  document.getElementById('page-title').textContent = `${teamName.toUpperCase()} \u2014 ${SEASON} SEASON TRACKER`;
  document.title = `${teamName} \u2014 ${SEASON} Season Tracker`;

  let data;
  try {
    data = await fetchCollegeSchedule(teamId);
  } catch (err) {
    document.getElementById('college-content').innerHTML = `<div class="loading">Error loading data.<br><small>${err.message}</small></div>`;
    return;
  }

  const events = data.events || [];
  const today = todayStr();

  const rows = [];
  let wins = 0, losses = 0, homeW = 0, homeL = 0, awayW = 0, awayL = 0;
  let streak = '', streakCount = 0, lastResult = '';

  let currentMonth = '';

  for (const event of events) {
    const comp = event.competitions?.[0];
    if (!comp) continue;

    const dateRaw = event.date;
    const dateOnly = dateRaw.substring(0, 10);
    const gMonth = monthName(dateOnly);
    if (gMonth !== currentMonth) { currentMonth = gMonth; rows.push({ type: 'month', label: currentMonth }); }

    // Figure out which competitor is our team
    let us = null, them = null;
    for (const c of comp.competitors) {
      if (parseInt(c.id) === teamId) us = c;
      else them = c;
    }
    if (!us || !them) continue;

    const isHome = us.homeAway === 'home';
    const oppName = them.team?.displayName || them.team?.shortDisplayName || 'TBD';
    const oppLabel = isHome ? oppName : `@ ${oppName}`;
    const isConf = comp.conferenceCompetition || false;

    const status = comp.status?.type?.name || '';
    const isFinal = status === 'STATUS_FINAL';
    const isToday = dateOnly === today;
    const isLive = status === 'STATUS_IN_PROGRESS' || status === 'STATUS_HALFTIME';

    let wl = '', record = '', tmR = '', oppR = '';
    let rowClass = 'upcoming';

    if (isFinal) {
      const usScore = parseInt(us.score?.displayValue || us.score || '0');
      const themScore = parseInt(them.score?.displayValue || them.score || '0');
      tmR = usScore;
      oppR = themScore;

      const won = usScore > themScore;
      wl = won ? 'W' : 'L';
      if (won) { wins++; if (isHome) homeW++; else awayW++; }
      else { losses++; if (isHome) homeL++; else awayL++; }

      if (wl === lastResult) streakCount++;
      else { streakCount = 1; lastResult = wl; }
      streak = `${wl}${streakCount}`;

      record = `${wins}-${losses}`;
      rowClass = won ? 'completed win' : 'completed loss';
    } else if (isToday || isLive) {
      rowClass = 'today';
      if (isLive) {
        tmR = us.score?.displayValue || us.score || '\u2014';
        oppR = them.score?.displayValue || them.score || '\u2014';
        wl = 'LIVE';
      }
    }

    rows.push({
      type: 'game',
      date: fmtDate(dateOnly),
      rawDate: dateOnly,
      wl, record, opp: oppLabel,
      tmR, oppR,
      conf: isConf,
      rowClass, isToday
    });
  }

  // Render
  let html = `<table><thead><tr>
    <th>Date</th><th>W/L</th><th>Record</th><th>Opponent</th>
    <th>TM</th><th>OPP</th>
  </tr></thead><tbody>`;

  for (const row of rows) {
    if (row.type === 'month') { html += `<tr class="month-divider"><td colspan="6">${row.label}</td></tr>`; continue; }
    const todayMark = row.isToday ? ' \u25C0' : '';
    const confTag = row.conf ? '<span class="conf-tag">*</span>' : '';
    html += `<tr class="${row.rowClass}"><td>${row.date}${todayMark}</td><td class="wl">${row.wl}</td><td>${row.record}</td><td class="opp">${row.opp}${confTag}</td><td>${row.tmR}</td><td>${row.oppR}</td></tr>`;
  }

  html += '</tbody></table>';
  html += '<div style="text-align:center;font-size:10px;color:#aaa;margin-top:6px;">* = conference game</div>';
  document.getElementById('college-content').innerHTML = html;

  document.getElementById('college-record').textContent = `Record: ${wins}-${losses}`;
  document.getElementById('college-streak').textContent = streak ? `Streak: ${streak}` : '';
  document.getElementById('college-home').textContent = `Home: ${homeW}-${homeL}`;
  document.getElementById('college-away').textContent = `Away: ${awayW}-${awayL}`;
  document.getElementById('updated').textContent = `Last updated: ${new Date().toLocaleString()}`;

  const todayRow = document.querySelector('#college-content tr.today');
  if (todayRow) todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ==================== INIT ====================
switchTab(activeTab);

// Refresh every 5 minutes
setInterval(() => {
  if (activeTab === 'mlb') buildMLBDashboard();
  else buildCollegeDashboard();
}, 5 * 60 * 1000);
</script>
</body>
</html>
